<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirigiendo… — Grupo Uniclima</title>
    <meta name="robots" content="noindex, follow" />
    <!--
      registro-curso.html quedó reemplazado por cotizaciones.html (ahora
      "Planilla de Inscripción", con envío por correo vía FormSubmit — ver
      cotizaciones.html). Esta página solo existe para que los enlaces
      viejos (por ejemplo, uno ya compartido con alguien) sigan
      funcionando: redirige automáticamente, pasando los mismos
      parámetros (?id=... o ?curso=...) para que el curso se preseleccione
      igual que antes.
    -->
    <script>
      (function () {
        var target = "cotizaciones.html" + window.location.search;
        window.location.replace(target);
      })();
    </script>
    <meta
      http-equiv="refresh"
      content="0; url=cotizaciones.html"
    />
  </head>
  <body>
    <p style="font-family: sans-serif; padding: 40px; text-align: center">
      Redirigiendo a la
      <a id="fallbackLink" href="cotizaciones.html">planilla de inscripción</a
      >…
    </p>
    <script>
      // Si por algún motivo el redirect automático no corrió (JS
      // deshabilitado cae al <meta refresh> de arriba; esto solo ajusta el
      // enlace de respaldo para que también lleve los parámetros).
      document.getElementById("fallbackLink").href =
        "cotizaciones.html" + window.location.search;
    </script>
  </body>
</html>
